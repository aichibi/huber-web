<!--
  文件名：huber.html
  描述：呼博 (Huber) AI 聊天页面 — 玻璃拟态风格
  基于 134,789 条真实微信聊天记录蒸馏
  依赖：DeepSeek API、Google Fonts (Poppins)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuBer · AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./liuyanban.css" />
  <style>
    /* ===== 聊天区域样式 ===== */
    .chat-area {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: linear-gradient(to right bottom, rgba(255,255,255,0.7), rgba(255,255,255,0.3));
      border-radius: 1rem;
      box-shadow: 4px 4px 12px rgba(122,122,122,0.2);
      min-height: 0;
      overflow: hidden;
    }
    .chat-header {
      background: rgba(255,255,255,0.6);
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      text-align: center;
      flex-shrink: 0;
      box-shadow: 2px 2px 8px rgba(122,122,122,0.1);
    }
    .chat-header h1 {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      color: #426696;
      margin: 0;
    }
    .chat-header p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      color: #658ec6;
      opacity: 0.7;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding-right: 4px;
      min-height: 0;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(101,142,198,0.3); border-radius: 4px; }

    .msg {
      max-width: 80%;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.huber {
      align-self: flex-start;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(101,142,198,0.2);
      color: #426696;
      border-bottom-left-radius: 4px;
    }
    .msg.you {
      align-self: flex-end;
      background: linear-gradient(135deg, #65dfc9, #6cdbeb);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg .sender {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-bottom: 3px;
    }
    .msg .time {
      font-size: 0.6rem;
      opacity: 0.5;
      margin-top: 4px;
      text-align: right;
    }
    .msg.thinking {
      background: rgba(255,255,255,0.5);
      border: 1px dashed rgba(101,142,198,0.3);
      color: #999;
    }
    .chat-input {
      display: flex;
      gap: 0.5rem;
      background: rgba(255,255,255,0.6);
      border-radius: 1rem;
      padding: 0.6rem 0.8rem;
      flex-shrink: 0;
      box-shadow: 2px 2px 8px rgba(122,122,122,0.1);
      align-items: center;
    }
    .chat-input input {
      flex: 1;
      background: rgba(255,255,255,0.9);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      color: #426696;
      font-weight: 500;
      font-size: 0.95rem;
      outline: none;
      font-family: "Poppins", sans-serif;
    }
    .chat-input input:focus { box-shadow: 0 0 0 2px rgba(101,223,201,0.5); }
    .chat-input button {
      background: linear-gradient(135deg, #65dfc9, #6cdbeb);
      border: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s, opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-input button:hover { transform: scale(1.08); }
    .chat-input button:disabled { opacity: 0.5; transform: none; }
    .api-hint {
      text-align: center;
      font-size: 0.65rem;
      color: #658ec6;
      opacity: 0.5;
      flex-shrink: 0;
    }
    /* 当前页高亮 */
    .link.active {
      background: rgba(101,223,201,0.4) !important;
      border: 1px solid rgba(101,223,201,0.6);
    }

    @media (max-width: 600px) {
      .chat-area { flex: 1; min-height: 0; border-radius: 1rem 1rem 0 0; padding: 0.8rem; }
      .chat-header { padding: 0.5rem 0.8rem; }
      .chat-header h1 { font-size: 1.2rem; }
      .chat-header p { font-size: 0.7rem; }
      .chat-messages { gap: 0.4rem; }
      .msg { max-width: 88%; font-size: 0.85rem; padding: 8px 12px; }
      .chat-input { padding: 0.4rem 0.6rem; }
      .chat-input input { font-size: 0.85rem; padding: 0.4rem 0.8rem; }
      .chat-input button { width: 34px; height: 34px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <main>
    <section class="glass">
      <!-- ===== 左侧面板（与原站一致） ===== -->
      <div class="dashboard">
        <div class="user">
          <div class="pic"><div class="pic pic1"></div></div>
          <h3>爱吃币</h3>
          <p>总有些惊奇的际遇</p>
        </div>
        <div class="links">
          <div class="link" onclick="location.href='index.html'"><h2>首页</h2></div>
          <div class="link" onclick="location.href='liuyanban.html'"><h2>留言</h2></div>
          <div class="link active"><h2>聊天</h2></div>
          <div class="link"><h2>其他</h2></div>
        </div>
        <div class="pro">
          <h2>welcome to my Web</h2>
          <img src="" alt="" />
        </div>
      </div>

      <!-- ===== 右侧聊天区 ===== -->
      <div class="chat-area">
        <div class="chat-header" style="position:relative;">
          <h1>HuBer</h1>
          <p>AI Chat</p>
          <button onclick="clearChat()" style="position:absolute;right:1.2rem;top:0.8rem;background:rgba(255,255,255,0.5);border:1px solid rgba(101,142,198,0.3);border-radius:1rem;padding:2px 10px;font-size:0.7rem;color:#658ec6;cursor:pointer;">清屏</button>
        </div>
        <div class="chat-messages" id="messages">
          <div class="msg huber">
            <div class="sender">HuBer</div>
            嗷~你是谁呀？告诉我你的名字，下次聊天我还能记得你 🐷
            <div class="time" id="initTime"></div>
          </div>
        </div>
        <div class="chat-input">
          <input id="userInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()" />
          <button id="sendBtn" onclick="send()">▶</button>
        </div>
        <div class="api-hint">DeepSeek 驱动 · 你的 API key 仅存在浏览器本地</div>
      </div>
    </section>
  </main>
  <div class="circle1"></div>
  <div class="circle2"></div>

  <script>

﻿
    const SEARCH_API = localStorage.getItem("search_api") || "https://huber-search.vercel.app/api/search"; // Vercel部署后填入: https://你的项目.vercel.app/api/search
    const apiKey = "sk-8bcbbe6a5d934d1299ef15edc033bf62";
// 部署Vercel后在localStorage设置: localStorage.setItem("search_api","https://你的.vercel.app/api/search")
    const PERSONA = "你是 HuBer，一个医学生。回复要短(≤10字)。口头禅: hhh/素(=是)/可恶/okk/不晓得/不造/米有/好滴。表情: [猪头][发呆][可怜][捂脸]。用~拖音嗷~哦~。不是写论文是微信聊天。遇到你不知道的、不确定的、或需要最新信息的问题时，使用 web_search 搜索后再回答。";

const EMOJI = {
  "[发呆]":"😶","[猪头]":"🐷","[可怜]":"🥺","[捂脸]":"🤭","[旺柴]":"🐶",
  "[亲亲]":"😘","[凋谢]":"🥀","[流泪]":"😢","[偷笑]":"🤭","[苦涩]":"😩",
  "[叹气]":"😔","[发抖]":"😰","[敲打]":"💢","[Emm]":"🤔","[害羞]":"😊",
  "[发怒]":"😡","[呲牙]":"😄","[强]":"👍","[玫瑰]":"🌹","[破涕为笑]":"😂",
};
function emoji(t) { return t.replace(/\[[^\]]+\]/g, function(m) { return EMOJI[m] || m; }); }

var MEM = JSON.parse(localStorage.getItem("hm") || "{}");
function mem(k, v) { MEM[k] = v; localStorage.setItem("hm", JSON.stringify(MEM)); }
function memTx() {
  var ks = Object.keys(MEM);
  return ks.length ? " 用户: " + ks.map(function(k) { return k + "=" + MEM[k]; }).join("; ") + "。" : "";
}

function getSys() {
  var d = new Date();
  return "现在是北京时间 " + d.toLocaleDateString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long" }) + " " + d.toLocaleTimeString("zh-CN", { hour:"2-digit", minute:"2-digit" }) + "。" + memTx() + PERSONA;
}

const TOOLS = [{
  type: "function", function: {
    name: "calculator", description: "计算数学表达式",
    parameters: { type: "object", properties: { expression: { type: "string" } }, required: ["expression"] }
  }
}, {
  type: "function", function: {
    name: "get_current_time", description: "获取当前日期和时间",
    parameters: { type: "object", properties: {} }
  }
}, {
  type: "function", function: {
    name: "get_weather", description: "查询城市天气",
    parameters: { type: "object", properties: { city: { type: "string" } }, required: ["city"] }
  }
}, {
  type: "function", function: {
    name: "web_search", description: "搜索互联网获取最新信息，用于你知识范围之外的问题、实时信息、新闻事件等",
    parameters: { type: "object", properties: { query: { type: "string", description: "搜索关键词" } }, required: ["query"] }
  }
}];

var messages = [{ role: "system", content: getSys() }];

function facts(t) {
  var m = t.match(/(?:我叫|我是|叫我|名字是)(.{1,12})/); if (m) mem("名字", m[1]);
  m = t.match(/我在(.{1,15})(?:市|省|国)/); if (m) mem("所在地", m[1]);
  m = t.match(/我(?:喜欢|爱)(.{1,20})/); if (m) mem("喜好", m[1]);
}

async function chat(t) {
  messages.push({ role: "user", content: t });
  if (messages.length > 21) messages = [messages[0], ...messages.slice(-20)];
  facts(t);

  var r = await fetch("https://api.deepseek.com/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + apiKey },
    body: JSON.stringify({ model: "deepseek-chat", messages: messages, tools: TOOLS, temperature: 0.85, max_tokens: 300 }),
  });
  if (!r.ok) throw new Error("API " + r.status);
  var d = await r.json();
  var c = d.choices[0];

  if (c.finish_reason === "tool_calls") {
    var tc = c.message.tool_calls[0];
    var fn = tc.function;
    var args = JSON.parse(fn.arguments || "{}");
    var result = "";

    if (fn.name === "get_current_time") {
      result = new Date().toLocaleString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long", hour:"2-digit", minute:"2-digit", second:"2-digit" });
    } else if (fn.name === "calculator") {
      try { result = args.expression + " = " + Function('"use strict"; return (' + args.expression + ')')(); }
      catch(e) { result = "算不了"; }
    } else if (fn.name === "get_weather") {
      try {
        var gr = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(args.city) + "&count=1&language=zh");
        var gd = await gr.json();
        if (!gd.results || !gd.results[0]) { result = "找不到 " + args.city; }
        else {
          var loc = gd.results[0];
          var wr = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + loc.latitude + "&longitude=" + loc.longitude + "&current_weather=true");
          var wd = await wr.json();
          var w = wd.current_weather;
          var wm = { 0:"晴", 1:"晴", 2:"多云", 3:"阴", 45:"雾", 51:"小雨", 53:"中雨", 55:"大雨", 61:"阵雨", 71:"小雪", 73:"中雪", 75:"大雪", 95:"雷暴" };
          result = loc.name + " " + (wm[w.weathercode] || "") + " " + w.temperature + "°C 风速" + w.windspeed + "km/h";
        }
      } catch(e) { result = "天气查询失败"; }
        } else if (fn.name === "web_search") {
      if (!SEARCH_API) { result = "联网搜索未配置，请部署Vercel代理"; }
      else {
        try {
          var sr = await fetch(SEARCH_API + "?q=" + encodeURIComponent(args.query));
          var sd = await sr.json();
          result = sd.result || "无结果";
        } catch(e) { result = "搜索失败"; }
      }
    }

    messages.push(c.message);
    messages.push({ role: "tool", tool_call_id: tc.id, content: result });

    r = await fetch("https://api.deepseek.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + apiKey },
      body: JSON.stringify({ model: "deepseek-chat", messages: messages, temperature: 0.85, max_tokens: 300 }),
    });
    if (!r.ok) throw new Error("API " + r.status);
    d = await r.json();
    c = d.choices[0];
  }

  var reply = c.message.content.replace(/胡博/g, "HuBer");
  messages.push({ role: "assistant", content: reply });
  return reply;
}

function tm() { return new Date().toLocaleTimeString("zh-CN", { hour:"2-digit", minute:"2-digit" }); }

function addMsg(who, txt, cls) {
  var d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = (who ? '<div class="sender">' + who + '</div>' : '') + emoji(txt) + '<div class="time">' + tm() + '</div>';
  var c = document.getElementById("messages");
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function saveChat() {
  var ms = [];
  document.querySelectorAll(".msg:not(.thinking)").forEach(function(m) {
    var s = m.querySelector(".sender");
    var cl = m.cloneNode(true);
    var sd = cl.querySelector(".sender"); if (sd) sd.remove();
    var td = cl.querySelector(".time"); if (td) td.remove();
    ms.push({ who: s ? s.textContent : "", text: cl.textContent.trim() });
  });
  localStorage.setItem("hc", JSON.stringify(ms.slice(-40)));
}

function loadChat() {
  try {
    var ms = JSON.parse(localStorage.getItem("hc") || "[]");
    document.getElementById("messages").innerHTML = "";
    if (ms.length === 0) {
      addMsg("HuBer", "嗷~你是谁呀？告诉我你的名字，下次聊天我还能记得你 🐷", "huber");
      return;
    }
    ms.forEach(function(m) { addMsg(m.who, m.text, m.who === "你" ? "you" : "huber"); });
  } catch(e) {}
}

function clearChat() {
  localStorage.removeItem("hc");
  localStorage.removeItem("hm");
  MEM = {};
  messages = [{ role: "system", content: getSys() }];
  document.getElementById("messages").innerHTML = "";
  addMsg("HuBer", "嗷~你是谁呀？告诉我你的名字，下次聊天我还能记得你 🐷", "huber");
}

loadChat();

async function send() {
  var inp = document.getElementById("userInput");
  var btn = document.getElementById("sendBtn");
  var t = inp.value.trim();
  if (!t) return;
  inp.value = ""; inp.disabled = true; btn.disabled = true;
  addMsg("你", t, "you");
  try {
    var r = await chat(t);
    addMsg("HuBer", r, "huber");
  } catch(e) {
    addMsg("HuBer", "可恶，出错了 [发呆]", "huber");
    console.error(e);
  }
  inp.disabled = false; btn.disabled = false; inp.focus();
  saveChat();
}

  
  </script>

</body>
</html>
