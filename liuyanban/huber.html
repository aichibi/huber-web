<!--
  文件名：huber.html
  描述：呼博 (Huber) AI 聊天页面 — 玻璃拟态风格
  基于 134,789 条真实微信聊天记录蒸馏
  依赖：DeepSeek API、Google Fonts (Poppins)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuBer · AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./liuyanban.css" />
  <style>
    /* ===== 聊天区域样式 ===== */
    .chat-area {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: linear-gradient(to right bottom, rgba(255,255,255,0.7), rgba(255,255,255,0.3));
      border-radius: 1rem;
      box-shadow: 4px 4px 12px rgba(122,122,122,0.2);
      min-height: 0;
      overflow: hidden;
    }
    .chat-header {
      background: rgba(255,255,255,0.6);
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      text-align: center;
      flex-shrink: 0;
      box-shadow: 2px 2px 8px rgba(122,122,122,0.1);
    }
    .chat-header h1 {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      color: #426696;
      margin: 0;
    }
    .chat-header p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      color: #658ec6;
      opacity: 0.7;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding-right: 4px;
      min-height: 0;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(101,142,198,0.3); border-radius: 4px; }

    .msg {
      max-width: 80%;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.huber {
      align-self: flex-start;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(101,142,198,0.2);
      color: #426696;
      border-bottom-left-radius: 4px;
    }
    .msg.you {
      align-self: flex-end;
      background: linear-gradient(135deg, #65dfc9, #6cdbeb);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg .sender {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-bottom: 3px;
    }
    .msg .time {
      font-size: 0.6rem;
      opacity: 0.5;
      margin-top: 4px;
      text-align: right;
    }
    .msg.thinking {
      background: rgba(255,255,255,0.5);
      border: 1px dashed rgba(101,142,198,0.3);
      color: #999;
    }
    .chat-input {
      display: flex;
      gap: 0.5rem;
      background: rgba(255,255,255,0.6);
      border-radius: 1rem;
      padding: 0.6rem 0.8rem;
      flex-shrink: 0;
      box-shadow: 2px 2px 8px rgba(122,122,122,0.1);
      align-items: center;
    }
    .chat-input input {
      flex: 1;
      background: rgba(255,255,255,0.9);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      color: #426696;
      font-weight: 500;
      font-size: 0.95rem;
      outline: none;
      font-family: "Poppins", sans-serif;
    }
    .chat-input input:focus { box-shadow: 0 0 0 2px rgba(101,223,201,0.5); }
    .chat-input button {
      background: linear-gradient(135deg, #65dfc9, #6cdbeb);
      border: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s, opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-input button:hover { transform: scale(1.08); }
    .chat-input button:disabled { opacity: 0.5; transform: none; }
    .api-hint {
      text-align: center;
      font-size: 0.65rem;
      color: #658ec6;
      opacity: 0.5;
      flex-shrink: 0;
    }
    /* 当前页高亮 */
    .link.active {
      background: rgba(101,223,201,0.4) !important;
      border: 1px solid rgba(101,223,201,0.6);
    }

    @media (max-width: 600px) {
      .chat-area { flex: 1; min-height: 0; border-radius: 1rem 1rem 0 0; padding: 0.8rem; }
      .chat-header { padding: 0.5rem 0.8rem; }
      .chat-header h1 { font-size: 1.2rem; }
      .chat-header p { font-size: 0.7rem; }
      .chat-messages { gap: 0.4rem; }
      .msg { max-width: 88%; font-size: 0.85rem; padding: 8px 12px; }
      .chat-input { padding: 0.4rem 0.6rem; }
      .chat-input input { font-size: 0.85rem; padding: 0.4rem 0.8rem; }
      .chat-input button { width: 34px; height: 34px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <main>
    <section class="glass">
      <!-- ===== 左侧面板（与原站一致） ===== -->
      <div class="dashboard">
        <div class="user">
          <div class="pic"><div class="pic pic1"></div></div>
          <h3>爱吃币</h3>
          <p>总有些惊奇的际遇</p>
        </div>
        <div class="links">
          <div class="link" onclick="location.href='index.html'"><h2>首页</h2></div>
          <div class="link" onclick="location.href='liuyanban.html'"><h2>留言</h2></div>
          <div class="link active"><h2>聊天</h2></div>
          <div class="link"><h2>其他</h2></div>
        </div>
        <div class="pro">
          <h2>welcome to my Web</h2>
          <img src="" alt="" />
        </div>
      </div>

      <!-- ===== 右侧聊天区 ===== -->
      <div class="chat-area">
        <div class="chat-header" style="position:relative;">
          <h1>HuBer</h1>
          <p>AI Chat</p>
          <button onclick="clearChat()" style="position:absolute;right:1.2rem;top:0.8rem;background:rgba(255,255,255,0.5);border:1px solid rgba(101,142,198,0.3);border-radius:1rem;padding:2px 10px;font-size:0.7rem;color:#658ec6;cursor:pointer;">清屏</button>
        </div>
        <div class="chat-messages" id="messages">
          <div class="msg huber">
            <div class="sender">HuBer</div>
            嗷~你是谁呀？告诉我你的名字，下次聊天我还能记得你 🐷
            <div class="time" id="initTime"></div>
          </div>
        </div>
        <div class="chat-input">
          <input id="userInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()" />
          <button id="sendBtn" onclick="send()">▶</button>
        </div>
        <div class="api-hint">DeepSeek 驱动 · 你的 API key 仅存在浏览器本地</div>
      </div>
    </section>
  </main>
  <div class="circle1"></div>
  <div class="circle2"></div>

  <script>
    // ===== API 配置 =====
    const apiKey = 'sk-8bcbbe6a5d934d1299ef15edc033bf62';

    // ===== HuBer 人设 =====
    const PERSONA = "你是 HuBer，一个医学生。回复要短(≤10字)。口头禅: hhh/素(=是)/可恶/okk/不晓得/不造/米有/好滴。表情: [猪头][发呆][可怜][捂脸]。用~拖音嗷~哦~。自称呼博自嘲。不是写论文是微信聊天。";

    function getSystemPrompt() {
      const now = new Date();
      const ds = now.toLocaleDateString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
      const ts = now.toLocaleTimeString("zh-CN", { hour:"2-digit", minute:"2-digit" });
      return "现在是北京时间 " + ds + " " + ts + "。" + PERSONA;
    }

    // ===== 表情转Emoji =====
    const EMOJI = {
      "[发呆]":"😶","[猪头]":"🐷","[可怜]":"🥺","[捂脸]":"🤭","[旺柴]":"🐶",
      "[亲亲]":"😘","[凋谢]":"🥀","[流泪]":"😢","[偷笑]":"🤭","[苦涩]":"😩",
      "[叹气]":"😔","[发抖]":"😰","[敲打]":"💢","[Emm]":"🤔","[害羞]":"😊",
      "[发怒]":"😡","[呲牙]":"😄","[强]":"👍","[玫瑰]":"🌹","[破涕为笑]":"😂",
    };
    function emoji(t) { return t.replace(/\[[^\]]+\]/g, m => EMOJI[m] || m); }

    // ===== 工具定义 =====
    const TOOLS = [{
      type: "function", function: {
        name: "get_current_time",
        description: "获取当前日期和时间",
        parameters: { type: "object", properties: {} }
      }
    }];

    // ===== 对话引擎 =====
    let messages = [{ role: "system", content: getSystemPrompt() }];

    async function chat(userText) {
      messages.push({ role: "user", content: userText });
      if (messages.length > 21) messages = [messages[0], ...messages.slice(-20)];

      let res = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + apiKey },
        body: JSON.stringify({ model: "deepseek-chat", messages, tools: TOOLS, temperature: 0.85, max_tokens: 300 }),
      });
      if (!res.ok) throw new Error("API error " + res.status);
      let data = await res.json();
      let choice = data.choices[0];

      // 处理工具调用
      if (choice.finish_reason === "tool_calls") {
        const tc = choice.message.tool_calls[0];
        let result = "";
        if (tc.function.name === "get_current_time") {
          result = new Date().toLocaleString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long", hour:"2-digit", minute:"2-digit", second:"2-digit" });
        }
        messages.push(choice.message);
        messages.push({ role: "tool", tool_call_id: tc.id, content: result });

        res = await fetch("https://api.deepseek.com/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + apiKey },
          body: JSON.stringify({ model: "deepseek-chat", messages, temperature: 0.85, max_tokens: 300 }),
        });
        if (!res.ok) throw new Error("API error " + res.status);
        data = await res.json();
        choice = data.choices[0];
      }

      const reply = choice.message.content;
      messages.push({ role: "assistant", content: reply });
      return reply;
    }

    // ===== UI =====
    function t() { return new Date().toLocaleTimeString("zh-CN", { hour:"2-digit", minute:"2-digit" }); }
    function addMsg(who, text, cls) {
      const d = document.createElement("div");
      d.className = "msg " + cls;
      d.innerHTML = (who ? '<div class="sender">' + who + '</div>' : '') + emoji(text) + '<div class="time">' + t() + '</div>';
      document.getElementById("messages").appendChild(d);
      document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    }

    async function send() {
      const inp = document.getElementById("userInput");
      const btn = document.getElementById("sendBtn");
      const text = inp.value.trim();
      if (!text) return;
      inp.value = ""; inp.disabled = true; btn.disabled = true;
      addMsg("你", text, "you");
      try {
        const reply = await chat(text);
        addMsg("HuBer", reply, "huber");
      } catch(e) {
        addMsg("HuBer", "可恶，出错了 [发呆]", "huber");
        console.error(e);
      }
      inp.disabled = false; btn.disabled = false; inp.focus();
    }
  </script>

</body>
</html>
