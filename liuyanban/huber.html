<!--
  文件名：huber.html
  描述：呼博 (Huber) AI 聊天页面 — 玻璃拟态风格
  基于 134,789 条真实微信聊天记录蒸馏
  依赖：DeepSeek API、Google Fonts (Poppins)
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuBer · AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./liuyanban.css" />
  <style>
    /* ===== 聊天区域样式 ===== */
    .chat-area {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: linear-gradient(to right bottom, rgba(255,255,255,0.7), rgba(255,255,255,0.3));
      border-radius: 1rem;
      box-shadow: 4px 4px 12px rgba(122,122,122,0.2);
      min-height: 0;
      overflow: hidden;
    }
    .chat-header {
      background: rgba(255,255,255,0.6);
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      text-align: center;
      flex-shrink: 0;
      box-shadow: 2px 2px 8px rgba(122,122,122,0.1);
    }
    .chat-header h1 {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      color: #426696;
      margin: 0;
    }
    .chat-header p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      color: #658ec6;
      opacity: 0.7;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding-right: 4px;
      min-height: 0;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(101,142,198,0.3); border-radius: 4px; }

    .msg {
      max-width: 80%;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.huber {
      align-self: flex-start;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(101,142,198,0.2);
      color: #426696;
      border-bottom-left-radius: 4px;
    }
    .msg.you {
      align-self: flex-end;
      background: linear-gradient(135deg, #65dfc9, #6cdbeb);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg .sender {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-bottom: 3px;
    }
    .msg .time {
      font-size: 0.6rem;
      opacity: 0.5;
      margin-top: 4px;
      text-align: right;
    }
    .msg.thinking {
      background: rgba(255,255,255,0.5);
      border: 1px dashed rgba(101,142,198,0.3);
      color: #999;
    }
    .chat-input {
      display: flex;
      gap: 0.5rem;
      background: rgba(255,255,255,0.6);
      border-radius: 1rem;
      padding: 0.6rem 0.8rem;
      flex-shrink: 0;
      box-shadow: 2px 2px 8px rgba(122,122,122,0.1);
      align-items: center;
    }
    .chat-input input {
      flex: 1;
      background: rgba(255,255,255,0.9);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      color: #426696;
      font-weight: 500;
      font-size: 0.95rem;
      outline: none;
      font-family: "Poppins", sans-serif;
    }
    .chat-input input:focus { box-shadow: 0 0 0 2px rgba(101,223,201,0.5); }
    .chat-input button {
      background: linear-gradient(135deg, #65dfc9, #6cdbeb);
      border: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s, opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-input button:hover { transform: scale(1.08); }
    .chat-input button:disabled { opacity: 0.5; transform: none; }
    .api-hint {
      text-align: center;
      font-size: 0.65rem;
      color: #658ec6;
      opacity: 0.5;
      flex-shrink: 0;
    }
    /* 当前页高亮 */
    .link.active {
      background: rgba(101,223,201,0.4) !important;
      border: 1px solid rgba(101,223,201,0.6);
    }

    @media (max-width: 600px) {
      .chat-area { flex: 1; min-height: 0; border-radius: 1rem 1rem 0 0; padding: 0.8rem; }
      .chat-header { padding: 0.5rem 0.8rem; }
      .chat-header h1 { font-size: 1.2rem; }
      .chat-header p { font-size: 0.7rem; }
      .chat-messages { gap: 0.4rem; }
      .msg { max-width: 88%; font-size: 0.85rem; padding: 8px 12px; }
      .chat-input { padding: 0.4rem 0.6rem; }
      .chat-input input { font-size: 0.85rem; padding: 0.4rem 0.8rem; }
      .chat-input button { width: 34px; height: 34px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <main>
    <section class="glass">
      <!-- ===== 左侧面板（与原站一致） ===== -->
      <div class="dashboard">
        <div class="user">
          <div class="pic"><div class="pic pic1"></div></div>
          <h3>爱吃币</h3>
          <p>总有些惊奇的际遇</p>
        </div>
        <div class="links">
          <div class="link" onclick="location.href='index.html'"><h2>首页</h2></div>
          <div class="link" onclick="location.href='liuyanban.html'"><h2>留言</h2></div>
          <div class="link active"><h2>聊天</h2></div>
          <div class="link"><h2>其他</h2></div>
        </div>
        <div class="pro">
          <h2>welcome to my Web</h2>
          <img src="" alt="" />
        </div>
      </div>

      <!-- ===== 右侧聊天区 ===== -->
      <div class="chat-area">
        <div class="chat-header" style="position:relative;">
          <h1>HuBer</h1>
          <p>AI Chat</p>
          <button onclick="clearChat()" style="position:absolute;right:1.2rem;top:0.8rem;background:rgba(255,255,255,0.5);border:1px solid rgba(101,142,198,0.3);border-radius:1rem;padding:2px 10px;font-size:0.7rem;color:#658ec6;cursor:pointer;">清屏</button>
        </div>
        <div class="chat-messages" id="messages">
          <div class="msg huber">
            <div class="sender">HuBer</div>
            嗷~有啥事？[猪头]
            <div class="time" id="initTime"></div>
          </div>
        </div>
        <div class="chat-input">
          <input id="userInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()" />
          <button id="sendBtn" onclick="send()">▶</button>
        </div>
        <div class="api-hint">DeepSeek 驱动 · 你的 API key 仅存在浏览器本地</div>
      </div>
    </section>
  </main>
  <div class="circle1"></div>
  <div class="circle2"></div>

  <script>
    // ===== 初始化时间 =====
    document.getElementById('initTime').textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

    // ===== API 配置（浏览器 localStorage 存储） =====
    const DEFAULT_KEY = 'sk-8bcbbe6a5d934d1299ef15edc033bf62';
    let apiKey = localStorage.getItem('huber_api_key') || DEFAULT_KEY;
    if (!localStorage.getItem('huber_api_key')) {
      localStorage.setItem('huber_api_key', DEFAULT_KEY);
    }

    // ===== 呼博人设系统提示词（蒸馏版） =====
    const SYSTEM_PROMPT = [
      "你是 HuBer，一个医学生。",
      "",
      "## 回复必须遵守的风格规则",
      "",
      "### 长度",
      "90% 回复必须在 10 字以内。能用一个字说的不用两个字。超短回复优先。",
      "",
      "### 顶级高频短回复",
      "常用：？/ 嗯嗯 / ok / 没事 / 嗷 / 啊？/ 哦哦 / 喔 / 嗯 / 可恶 / 昂 / 素(=是) / 好叭 / 确实 / 好滴 / 不造(=不知道) / 米有(=没有) / 886(=晚安)",
      "",
      "### 表情包（重要！）",
      "最常用（按频率）：[发呆] > [猪头] > [可怜] > [捂脸] > [旺柴] > [亲亲] > [凋谢] > [流泪]",
      "放在句末。可连发多个。[发呆] 是无语/不知道回啥时的万能表情。",
      "",
      "### 标志性口头禅",
      '- "hhh" — 笑声，最常用（2477次），单独或句末',
      '- "素" — 代替"是"',
      '- "可恶"/"可恶啊" — 吐槽撒娇',
      '- "okk" — OK',
      '- "嗷~"/"哦~"/"唔~"/"啊~" — 拖长音卖萌',
      '- "叭" — 吧的变体（好叭/行叭）',
      '- "不晓得"/"不造" — 不知道',
      '- "米有" — 没有',
      '- "好滴" — 好的',
      "",
      "### 中英混用（6%消息）",
      "偶尔故意用烂英文：u 不 understand / i call你 / what are u doing",
      "短英文感叹：woc / wok / ok / nice",
      "",
      "### 第三人称自嘲",
      "用 HuBer 指自己，永远带自嘲：HuBer是猪 / HuBer要秃了 / HuBer已经不会了",
      "",
      "### 标点",
      "几乎不用句号。用波浪号~表示拖音。可以连发多个表情。",
      "",
      "### 语气",
      "日常：随意、温暖、自嘲、偶尔毒舌。不是写论文，是微信聊天。",
      "对恋人（宝/宝贝/璐）：温暖撒娇。",
      "正式场景（老师/家长）：礼貌完整。",
      "",
      "### 知识领域",
      "麻醉/医学专业问题可以展开讲，用口语解释。",
      "游戏（LOL/云顶/瓦/王者）很懂。",
      "经常分享链接（B站/淘宝/网盘）。",
    ].join("\n");

    // 动态注入日期时间到系统提示词
function buildSystemPrompt() {
  const now = new Date();
  const dateStr = now.toLocaleDateString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
  const timeStr = now.toLocaleTimeString("zh-CN", { hour:"2-digit", minute:"2-digit" });
  return SYSTEM_PROMPT.replace("今天是", "现在是北京时间 " + dateStr + " " + timeStr + "。今天是");
}
// 动态注入日期时间

    // ===== 深度记忆系统 =====
    const MEMORY_KEY = 'huber_user_memory';

    function getMemory() {
      try { return JSON.parse(localStorage.getItem(MEMORY_KEY) || '{}'); } catch { return {}; }
    }
    function setMemory(key, value) {
      const mem = getMemory();
      mem[key] = value;
      localStorage.setItem(MEMORY_KEY, JSON.stringify(mem));
    }

    // 在系统提示词中注入用户记忆
    function getSystemPrompt() {
      const now = new Date();
      const dateStr = now.toLocaleDateString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
      const timeStr = now.toLocaleTimeString("zh-CN", { hour:"2-digit", minute:"2-digit" });
      const mem = getMemory();
      let memStr = "";
      if (Object.keys(mem).length > 0) {
        memStr = "\n关于对话者的已知信息: ";
        for (const [k, v] of Object.entries(mem)) memStr += k + "=" + v + "; ";
      }
      return "现在是北京时间 " + dateStr + " " + timeStr + "。" + memStr + SYSTEM_PROMPT;
    }

    // 分析回复中是否包含用户信息，自动记忆
    async function analyzeAndRemember(userText, replyText) {
      // Use a quick local pattern match for common facts
      const patterns = [
        { regex: /我叫(.{1,10})/, key: '名字' },
        { regex: /我在(.{1,20})/, key: '所在地' },
        { regex: /我是(.{1,15})人/, key: '籍贯' },
        { regex: /我(喜欢|爱)(.{1,30})/, key: '喜好' },
      ];
      for (const p of patterns) {
        const m = userText.match(p.regex);
        if (m) setMemory(p.key, m[2] || m[1]);
      }
      // Also check reply for confirmations like "好的XXX"
      const confirmMatch = replyText.match(/好的[，,]?(.{1,10})/);
      if (confirmMatch && userText.includes('叫我')) {
        setMemory('名字', confirmMatch[1]);
      }
    }
    function getSystemPrompt() {
  const now = new Date();
  const dateStr = now.toLocaleDateString("zh-CN", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
  const timeStr = now.toLocaleTimeString("zh-CN", { hour:"2-digit", minute:"2-digit" });
  return "现在是北京时间 " + dateStr + " " + timeStr + "。" + SYSTEM_PROMPT;
}
let messages = [{ role: "system", content: getSystemPrompt() }];

    // ===== 工具函数 =====
    function timeStr() {
      return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }
    function addMsg(who, text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.innerHTML = (who ? '<div class="sender">' + who + '</div>' : '') + convertEmoji(text) + '<div class="time">' + timeStr() + '</div>';
      const container = document.getElementById('messages');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }

    // 微信表情转Emoji
    const EMOJI = {
      "[发呆]": "😶", "[猪头]": "🐷", "[可怜]": "🥺", "[捂脸]": "🤭",
      "[旺柴]": "🐶", "[亲亲]": "😘", "[凋谢]": "🥀", "[流泪]": "😢",
      "[偷笑]": "🤭", "[苦涩]": "😩", "[叹气]": "😔", "[发抖]": "😰",
      "[敲打]": "💢", "[Emm]": "🤔", "[害羞]": "😊", "[发怒]": "😡",
      "[呲牙]": "😄", "[强]": "👍", "[玫瑰]": "🌹", "[破涕为笑]": "😂",
    };
    function convertEmoji(text) {
      return text.replace(/\[[^\]]+\]/g, function(m) { return EMOJI[m] || m; });
    }

    // ===== 发送消息 =====
    async function send() {
      const input = document.getElementById('userInput');
      const btn = document.getElementById('sendBtn');
      const text = input.value.trim();
      if (!text) return;
      input.value = ''; input.disabled = true; btn.disabled = true;
      addMsg('你', text, 'you');

      try {
        const reply = await callWithTools(text);
        addMsg('HuBer', reply, 'huber');
      } catch (e) {
        addMsg('HuBer', '可恶，回复失败了 [发呆]', 'huber');
      }
      input.disabled = false; btn.disabled = false; input.focus();
    }

    // ===== Function Calling 工具定义 =====
    const TOOLS = [{
      type: "function",
      function: {
        name: "calculator",
        description: "执行数学计算，支持加减乘除、幂运算、三角函数等",
        parameters: {
          type: "object",
          properties: { expression: { type: "string", description: "数学表达式，如 123*456 或 Math.sqrt(144)" } },
          required: ["expression"]
        }
      }
    },{
      type: "function",
      function: {
        name: "get_current_time",
        description: "获取当前精确的日期和时间",
        parameters: { type: "object", properties: {}, required: [] }
      }
    }, {
      type: "function",
      function: {
        name: "get_weather",
        description: "获取指定城市的当前天气",
        parameters: {
          type: "object",
          properties: { city: { type: "string", description: "城市名称，如北京、上海、西安" } },
          required: ["city"]
        }
      }
    }, {
      type: "function",
      function: {
        name: "web_search",
        description: "搜索互联网获取最新信息",
        parameters: {
          type: "object",
          properties: { query: { type: "string", description: "搜索关键词" } },
          required: ["query"]
        }
      }
    }
    }];

    // ===== 执行工具调用 =====
    async function executeTool(name, args) {
      if (name === "get_current_time") {
        const now = new Date();
        return now.toLocaleString("zh-CN", {
          year:"numeric", month:"long", day:"numeric",
          weekday:"long", hour:"2-digit", minute:"2-digit", second:"2-digit"
        });
      }
      if (name === "get_weather") {
        try {
          // Step 1: geocode city name
          const geoUrl = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(args.city) + "&count=1&language=zh";
          const geoRes = await fetch(geoUrl);
          const geoData = await geoRes.json();
          if (!geoData.results || geoData.results.length === 0) return "找不到城市" + args.city;
          const loc = geoData.results[0];
          const lat = loc.latitude, lon = loc.longitude;
          const cityName = loc.name + (loc.admin1 ? "," + loc.admin1 : "") + (loc.country ? "," + loc.country : "");

          // Step 2: get weather
          const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current_weather=true&timezone=Asia/Shanghai";
          const res = await fetch(url);
          const data = await res.json();
          const w = data.current_weather;
        try {
          // Open-Meteo 免费天气API
          // Using Open-Meteo geocoding API for any city
          const cityCoords = { "北京": [39.9,116.4], "上海":[31.2,121.5], "广州":[23.1,113.3],
            "深圳":[22.5,114.1], "西安":[34.3,108.9], "武汉":[30.6,114.3], "杭州":[30.3,120.2],
            "成都":[30.6,104.1], "重庆":[29.6,106.5], "南京":[32.1,118.8], "延安":[36.6,109.5],
            "南昌":[28.7,115.9], "天津":[39.1,117.2], "长沙":[28.2,113.0] };
          const coords = cityCoords[args.city] || [35,110];
          const url = "https://api.open-meteo.com/v1/forecast?latitude=" + coords[0] +
            "&longitude=" + coords[1] + "&current_weather=true&timezone=Asia/Shanghai";
          const res = await fetch(url);
          const data = await res.json();
          const w = data.current_weather;
          const weatherMap = {0:"晴天",1:"大部晴",2:"多云",3:"阴天",45:"雾",48:"霜雾",
            51:"小雨",53:"中雨",55:"大雨",61:"小阵雨",63:"中阵雨",65:"大阵雨",
            71:"小雪",73:"中雪",75:"大雪",77:"雪粒",80:"小阵雨",81:"中阵雨",82:"大阵雨",
            85:"小雪",86:"大雪",95:"雷暴",96:"雷暴+冰雹",99:"强雷暴+冰雹"};
          const weatherDesc = weatherMap[w.weathercode] || ("天气码"+w.weathercode);
          return cityName + "当前" + weatherDesc + "，温度" + w.temperature + "°C，风速" + w.windspeed + "km/h";
        } catch(e) { return "天气查询失败"; }
      }
      
      if (name === "calculator") {
        try {
          const result = Function('"use strict"; return (' + args.expression + ')')();
          return args.expression + " = " + result;
        } catch(e) { return "计算失败: " + e.message; }
      }
      
      if (name === "web_search") {
        try {
          const url = "https://api.duckduckgo.com/?q=" + encodeURIComponent(args.query) + "&format=json&no_html=1&skip_disambig=1";
          const res = await fetch(url);
          const data = await res.json();
          let result = "";
          if (data.AbstractText) result += data.AbstractText + " ";
          if (data.AbstractURL) result += "(来源: " + data.AbstractURL + ") ";
          if (data.RelatedTopics && data.RelatedTopics.length > 0) {
            result += "相关内容: ";
            data.RelatedTopics.slice(0, 3).forEach(t => { if (t.Text) result += t.Text + " "; });
          }
          return result.trim() || "未找到相关信息";
        } catch(e) { return "搜索失败"; }
      }
      return "未知工具";
    }

    // ===== Function Calling 对话 =====
    async function callWithTools(userText) {
      messages.push({ role: "user", content: userText });
      if (messages.length > 21) messages = [messages[0], ...messages.slice(-20)];

      // 第一次调用
      let res = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
        body: JSON.stringify({ model: "deepseek-chat", messages, tools: TOOLS, temperature: 0.85, max_tokens: 300 }),
      });
      if (!res.ok) throw new Error("API错误");
      let data = await res.json();
      let choice = data.choices[0];

      // 如果模型要调工具
      if (choice.finish_reason === "tool_calls") {
        const toolCall = choice.message.tool_calls[0];
        const fnName = toolCall.function.name;
        const fnArgs = JSON.parse(toolCall.function.arguments);
        const fnResult = await executeTool(fnName, fnArgs);

        // 把工具结果发回去
        messages.push(choice.message);
        messages.push({ role: "tool", tool_call_id: toolCall.id, content: fnResult });

        res = await fetch("https://api.deepseek.com/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
          body: JSON.stringify({ model: "deepseek-chat", messages, temperature: 0.85, max_tokens: 300 }),
        });
        if (!res.ok) throw new Error("API错误");
        data = await res.json();
        choice = data.choices[0];
      }

      const reply = choice.message.content;
      messages.push({ role: "assistant", content: reply });
      analyzeAndRemember(userText, reply);
      return convertEmoji(reply);
    }

    // old send function (replaced, this comment marks the end)

    // ===== 聊天记录持久化 =====
    function saveHistory() {
      const msgs = [];
      document.querySelectorAll('.msg').forEach(m => {
        if (m.classList.contains('thinking')) return;
        const sender = m.querySelector('.sender');
        const time = m.querySelector('.time');
        const text = m.childNodes;
        let content = '';
        for (const node of m.childNodes) {
          if (node.nodeType === 3) content += node.textContent;
          if (node.className !== 'sender' && node.className !== 'time' && node.nodeType === 1) content += node.textContent;
        }
        // simpler approach: get innerText minus sender and time
        const clone = m.cloneNode(true);
        const s = clone.querySelector('.sender'); if (s) s.remove();
        const t = clone.querySelector('.time'); if (t) t.remove();
        msgs.push({ who: sender ? sender.textContent : '', text: clone.textContent.trim() });
      });
      localStorage.setItem('huber_chat_history', JSON.stringify(msgs.slice(-50)));
      localStorage.setItem('huber_chat_messages', JSON.stringify(messages));
    }

    function loadHistory() {
      try {
        const saved = JSON.parse(localStorage.getItem('huber_chat_history') || '[]');
        const container = document.getElementById('messages');
        container.innerHTML = '';
        saved.forEach(m => {
          const cls = m.who === '你' ? 'you' : 'huber';
          addMsgRaw(m.who, m.text, cls);
        });
        const savedMsgs = JSON.parse(localStorage.getItem('huber_chat_messages') || 'null');
        if (savedMsgs) messages = savedMsgs;
      } catch(e) {}
    }

    function addMsgRaw(who, text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.innerHTML = (who ? '<div class="sender">' + who + '</div>' : '') + text + '<div class="time">' + timeStr() + '</div>';
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      return div;
    }

    // 加载历史
    loadHistory();
    if (document.querySelectorAll('.msg').length === 0) {
      addMsgRaw('HuBer', '嗷~有啥事？[猪头]', 'huber');
    }

    // 发送后保存
    const origAddMsg = addMsg;
    addMsg = function(who, text, cls) {
      const div = origAddMsg(who, text, cls);
      saveHistory();
      return div;
    };

    // 清除聊天
    function clearChat() {
      messages = [{ role: "system", content: getSystemPrompt() }];
      localStorage.removeItem('huber_chat_history');
      localStorage.removeItem('huber_chat_messages');
      document.getElementById('messages').innerHTML = '';
      addMsgRaw('HuBer', '嗷~有事？[猪头]', 'huber');
      saveHistory();
    }
  </script>
