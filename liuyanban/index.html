<!--
  文件名：index.html
  描述：玻璃拟态风格留言板页面（Supabase 版，支持多设备同时留言）
  依赖：Google Fonts (Poppins)、liuyanban.css
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Website</title>
    <!-- 引入 Google Fonts：Poppins 字体 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- 引入自定义样式表 -->
    <link rel="stylesheet" href="./liuyanban.css" />
  </head>
  <body>
    <main>
      <section class="glass">
        <!-- ===== 左侧面板 ===== -->
        <div class="dashboard">
          <div class="user">
            <div class="pic">
              <div class="pic pic1"></div>
            </div>
            <h3>爱吃币</h3>
            <p>总有些惊奇的际遇</p>
          </div>
          <div class="links">
            <div class="link" onclick="location.href='../index.html'"><h2>首页</h2></div>
            <div class="link" onclick="location.href='index.html'"><h2>留言</h2></div>
            <div class="link" onclick="location.href='huber.html'"><h2>聊天</h2></div>
            <div class="link"><h2>其他</h2></div>
          </div>
          <div class="pro">
            <h2>welcome to my Web</h2>
            <img src="" alt="" />
          </div>
        </div>

        <!-- ===== 右侧留言板 ===== -->
        <div class="liuyan">
          <div class="status">
            <h1>留言板</h1>
            <input type="text" id="nameInput" placeholder="昵称（可选）" />
            <textarea id="messageInput" placeholder="写下你的留言..."></textarea>
            <button class="button" onclick="submitMessage()">发表</button>
          </div>

          <div class="cards" id="messageList">
            <p style="text-align: center; color: #658ec6; opacity: 0.7">
              加载中...
            </p>
          </div>
        </div>
      </section>
    </main>

    <div class="circle1"></div>
    <div class="circle2"></div>

    <!-- ===== Supabase SDK ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ===== Supabase 留言板逻辑 ===== -->
    <script>
      const SUPABASE_URL = "https://ixowncnmsgdxrzymqmjd.supabase.co";
      const SUPABASE_KEY =
        "sb_publishable_L6s2L9sV93gzl8htumPsNA_OY2dxTbH";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      async function submitMessage() {
        const name =
          document.getElementById("nameInput").value.trim() || "匿名";
        const text = document.getElementById("messageInput").value.trim();

        if (!text) {
          alert("留言内容不能为空！");
          return;
        }

        const { error } = await db.from("messages").insert({ name, text });

        if (error) {
          alert("发表失败：" + error.message);
          return;
        }

        document.getElementById("nameInput").value = "";
        document.getElementById("messageInput").value = "";
        await loadMessages();
      }

      async function loadMessages() {
        const listEl = document.getElementById("messageList");

        const { data: messages, error } = await db
          .from("messages")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          listEl.innerHTML =
            '<p style="text-align:center; color:#658ec6; opacity:0.7;">加载失败：' +
            error.message +
            "</p>";
          return;
        }

        if (!messages || messages.length === 0) {
          listEl.innerHTML =
            '<p style="text-align:center; color:#658ec6; opacity:0.7;">还没有留言，快来抢沙发吧！</p>';
          return;
        }

        let html = "";
        messages.forEach((msg) => {
          const time = msg.created_at
            ? new Date(msg.created_at).toLocaleString("zh-CN")
            : "";
          html += `
            <div class="card">
              <div class="card-info">
                <h2>${msg.name}</h2>
                <p>${msg.text}</p>
                <small style="color:#999">${time}</small>
              </div>
            </div>
          `;
        });
        listEl.innerHTML = html;
      }

      loadMessages();
    </script>
  </body>
</html>
