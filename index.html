<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爱吃币的个人主页</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./liuyanban/liuyanban.css" />
  <style>
    .entry-cards {
      display: flex; flex-direction: column; gap: 1.5rem;
      align-items: center; justify-content: center; width: 100%;
    }
    .entry-card {
      background: rgba(255,255,255,0.7);
      border-radius: 1.5rem; padding: 2rem 1.5rem;
      cursor: pointer; transition: all 0.3s ease;
      box-shadow: 2px 2px 12px rgba(122,122,122,0.15);
      text-align: center; width: 100%; max-width: 320px;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .entry-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.9);
      box-shadow: 4px 8px 24px rgba(122,122,122,0.25);
    }
    .entry-card .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .entry-card h2 {
      font-size: 1.3rem; color: #426696; margin: 0 0 0.3rem;
      font-weight: 600;
    }
    .entry-card p {
      font-size: 0.85rem; color: #658ec6; opacity: 0.8; margin: 0;
    }
    .entry-card .badge {
      display: inline-block;
      background: linear-gradient(135deg, #65dfc9, #6cdbeb);
      color: #fff; font-size: 0.7rem; padding: 2px 10px;
      border-radius: 1rem; margin-top: 0.5rem;
    }
    @media (max-width: 600px) {
      .entry-cards { padding: 0 1rem; }
      .entry-card { max-width: 100%; padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
  <main>
    <section class="glass">
      <div class="dashboard">
        <div class="user">
          <div class="pic"><div class="pic pic1"></div></div>
          <h3>爱吃币</h3>
          <p>总有些惊奇的际遇</p>
        </div>
        <div class="pro">
          <h2>welcome to my Web</h2>
          <img src="" alt="" />
        </div>
      </div>

      <div class="liuyan">
        <div class="status">
          <h1>🌐 我的页面</h1>
        </div>
        <div class="entry-cards">
          <div class="entry-card" onclick="location.href='liuyanban/index.html'">
            <div class="icon">💬</div>
            <h2>留言板</h2>
            <p>玻璃拟态留言板 · Supabase 驱动</p>
            <div class="badge">多人实时留言</div>
          </div>
          <div class="entry-card" onclick="location.href='liuyanban/huber.html'">
            <div class="icon">🤖</div>
            <h2>呼博 AI 聊天</h2>
            <p>134,789 条消息蒸馏 · DeepSeek 驱动</p>
            <div class="badge">AI 人格聊天</div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div class="circle1"></div>
  <div class="circle2"></div>
</body>
</html>
