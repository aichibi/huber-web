<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <style>
    .welcome-area {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to right bottom, rgba(255,255,255,0.7), rgba(255,255,255,0.3));
      border-radius: 1rem;
      box-shadow: 4px 4px 12px rgba(122,122,122,0.2);
    }
    .welcome-area h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      color: #426696;
      margin: 0;
      animation: float 3s ease-in-out infinite;
    }
    .welcome-area p {
      font-size: 1rem;
      color: #658ec6;
      opacity: 0.7;
      margin-top: 1rem;
    }
    .welcome-area .deco {
      font-size: 4rem;
      margin-top: 1rem;
      opacity: 0.6;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <main>
    <section class="glass">
      <div class="dashboard">

        </div>
        <div class="pro">

          <img src="" alt="" />
        </div>
      </div>

      <div class="welcome-area">
        <div class="deco">🌊</div>
        <h1>嗨，欢迎来访</h1>
        <p>总有些惊奇的际遇</p>
